<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integração - ADSA Brasil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0d2d5a; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-gradient { background: linear-gradient(90deg, #f47b20, #fdb913); }
        .modal-feedback { display: none; position: fixed; inset: 0; background: rgba(13, 45, 90, 0.95); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center mx-auto mb-4 text-[#0d2d5a] text-3xl font-black italic shadow-xl">DINC</div>
            <h1 class="text-white text-3xl font-black uppercase tracking-tighter">Faça sua Integração</h1>
            <p class="text-blue-200 text-sm mt-2">Preencha os dados abaixo para agendarmos sua recepção no 5º andar.</p>
        </div>

        <form onsubmit="enviarInscricao(event)" class="glass p-8 rounded-[2.5rem] space-y-5 shadow-2xl">
            <div>
                <label class="text-[10px] font-bold text-blue-300 uppercase ml-2">Nome Completo *</label>
                <input type="text" id="lpNome" required placeholder="Digite seu nome" class="w-full p-4 rounded-2xl bg-white/10 border border-white/20 text-white outline-none focus:border-yellow-500 transition-all uppercase font-bold text-sm">
            </div>

            <div>
                <label class="text-[10px] font-bold text-blue-300 uppercase ml-2">WhatsApp *</label>
                <input type="text" id="lpTel" required oninput="mascaraTel(this)" placeholder="(00) 00000-0000" class="w-full p-4 rounded-2xl bg-white/10 border border-white/20 text-white outline-none focus:border-yellow-500 transition-all font-bold text-sm">
            </div>

            <div>
                <label class="text-[10px] font-bold text-blue-300 uppercase ml-2">Data de Nascimento (Opcional)</label>
                <input type="date" id="lpNasc" class="w-full p-4 rounded-2xl bg-white/10 border border-white/20 text-white outline-none focus:border-yellow-500 transition-all font-bold text-sm">
            </div>

            <button type="submit" id="btnEnviar" class="w-full btn-gradient text-[#0d2d5a] font-black py-5 rounded-2xl shadow-lg uppercase italic tracking-widest hover:scale-[1.02] transition-all">Enviar Inscrição</button>
        </form>
    </div>

    <div id="modalFeedback" class="modal-feedback">
        <div class="text-center max-w-xs">
            <div id="feedbackIcon" class="text-6xl mb-6"></div>
            <h2 id="feedbackTitle" class="text-white text-2xl font-black uppercase mb-2"></h2>
            <p id="feedbackMsg" class="text-blue-200 text-sm mb-8"></p>
            <button onclick="fecharModal()" class="w-full py-4 border-2 border-white/20 text-white font-bold rounded-2xl uppercase text-xs tracking-widest">Fechar</button>
        </div>
    </div>

    <script>
        const API_URL = 'SUA_URL_DO_GAS_AQUI';

        function mascaraTel(i) {
            let v = i.value.replace(/\D/g,'');
            v = v.replace(/^(\d{2})(\d)/g,"($1) $2");
            v = v.replace(/(\d)(\d{4})$/,"$1-$2");
            i.value = v;
        }

        async function enviarInscricao(e) {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.innerHTML = 'Enviando...';
            btn.disabled = true;

            const payload = {
                action: 'saveIntegracaoLP',
                nome: document.getElementById('lpNome').value,
                telefone: document.getElementById('lpTel').value,
                nascimento: document.getElementById('lpNasc').value
            };

            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload), mode: 'no-cors' });
                mostrarFeedback(true);
            } catch (err) {
                mostrarFeedback(false);
            } finally {
                btn.innerHTML = 'Enviar Inscrição';
                btn.disabled = false;
            }
        }

        function mostrarFeedback(sucesso) {
            const modal = document.getElementById('modalFeedback');
            const icon = document.getElementById('feedbackIcon');
            const title = document.getElementById('feedbackTitle');
            const msg = document.getElementById('feedbackMsg');

            if(sucesso) {
                icon.innerHTML = '🎉';
                title.innerText = 'Recebido!';
                msg.innerText = 'Sua inscrição foi enviada com sucesso. Em breve nossa equipe entrará em contato para confirmar sua integração!';
            } else {
                icon.innerHTML = '❌';
                title.innerText = 'Ops!';
                msg.innerText = 'Ocorreu um erro ao enviar. Por favor, tente novamente ou fale com um líder.';
            }
            modal.style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('modalFeedback').style.display = 'none';
            document.querySelector('form').reset();
        }
    </script>
</body>
</html>
