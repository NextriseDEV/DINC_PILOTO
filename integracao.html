<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integração - ADSA Brasil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0d2d5a; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-gradient { background: linear-gradient(90deg, #f47b20, #fdb913); }
        .modal-feedback { display: none; position: fixed; inset: 0; background: rgba(13, 45, 90, 0.95); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="flex justify-center gap-6 mb-6">
                <img src="https://nextrisedev.github.io/DINC_PILOTO/administrator/m%C3%A9dia/ADSA.png" alt="ADSA" class="h-44 w-auto object-contain" style="filter: brightness(0) invert(1);">
                <img src="https://nextrisedev.github.io/DINC_PILOTO/administrator/m%C3%A9dia/DINC.png" alt="DINC" class="h-44 w-auto object-contain" style="filter: brightness(0) invert(1);">
            </div>
            <h1 class="text-2xl font-black text-white uppercase tracking-tighter">Ficha de Integração</h1>
            <p class="text-blue-200 text-xs font-bold uppercase tracking-widest mt-2 italic">Seja muito bem-vindo à família ADSA Brasil!</p>
        </div>

        <form onsubmit="enviarInscricao(event)" class="glass p-8 rounded-3xl shadow-2xl space-y-5">
            <div>
                <label class="block text-[10px] font-black text-blue-200 uppercase tracking-widest mb-2 ml-1">Nome Completo</label>
                <input type="text" id="lpNome" required class="w-full bg-white/10 border border-white/20 rounded-2xl px-5 py-4 text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all uppercase font-bold text-sm" placeholder="DIGITE SEU NOME">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-black text-blue-200 uppercase tracking-widest mb-2 ml-1">Telefone (WhatsApp)</label>
                    <input type="tel" id="lpTel" required class="w-full bg-white/10 border border-white/20 rounded-2xl px-5 py-4 text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all font-bold text-sm" placeholder="(00) 00000-0000">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-blue-200 uppercase tracking-widest mb-2 ml-1">Data Nascimento</label>
                    <input type="date" id="lpNasc" required class="w-full bg-white/10 border border-white/20 rounded-2xl px-5 py-4 text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all font-bold text-sm">
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-black text-blue-200 uppercase tracking-widest mb-2 ml-1">E-mail</label>
                <input type="email" id="lpEmail" required class="w-full bg-white/10 border border-white/20 rounded-2xl px-5 py-4 text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all font-bold text-sm" placeholder="seuemail@exemplo.com">
            </div>

            <div>
                <label class="block text-[10px] font-black text-blue-200 uppercase tracking-widest mb-2 ml-1">Endereço Residencial</label>
                <input type="text" id="lpEndereco" required class="w-full bg-white/10 border border-white/20 rounded-2xl px-5 py-4 text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all uppercase font-bold text-sm" placeholder="RUA, NÚMERO, BAIRRO, CIDADE">
            </div>

            <button type="submit" id="btnEnviar" class="w-full btn-gradient text-white font-black py-5 rounded-2xl shadow-lg hover:scale-[1.02] active:scale-95 transition-all uppercase tracking-widest text-xs italic">
                Enviar Inscrição
            </button>
        </form>

    <div id="modalFeedback" class="modal-feedback">
        <div class="text-center max-w-xs">
            <div id="feedbackIcon" class="text-6xl mb-6"></div>
            <h2 id="feedbackTitle" class="text-white text-2xl font-black uppercase mb-2"></h2>
            <p id="feedbackMsg" class="text-blue-200 text-sm mb-8"></p>
            <button onclick="fecharModal()" class="w-full py-4 border-2 border-white/20 text-white font-bold rounded-2xl uppercase text-xs tracking-widest">Fechar</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwqjPBQMQ3x0yZNPjh1RqEeZH_Wc7F2-GpVpGVERGd6MyjssvyUiegRV8wWW9n48Szv/exec';

        function mascaraTel(i) {
            let v = i.value.replace(/\D/g,'');
            v = v.replace(/^(\d{2})(\d)/g,"($1) $2");
            v = v.replace(/(\d)(\d{4})$/,"$1-$2");
            i.value = v;
        }

        // Atualização do payload para incluir E-mail e Endereço
async function enviarInscricao(e) {
    e.preventDefault();
    const btn = document.getElementById('btnEnviar');
    btn.innerHTML = 'Enviando...';
    btn.disabled = true;

    const payload = {
        action: 'saveIntegracaoLP',
        nome: document.getElementById('lpNome').value,
        telefone: document.getElementById('lpTel').value,
        nascimento: document.getElementById('lpNasc').value,
        email: document.getElementById('lpEmail').value,       // NOVO CAMPO
        endereco: document.getElementById('lpEndereco').value  // NOVO CAMPO
    };

    try {
        await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload), mode: 'no-cors' });
        mostrarFeedback(true);
    } catch (err) {
        mostrarFeedback(false);
    } finally {
        btn.innerHTML = 'Enviar Inscrição';
        btn.disabled = false;
    }
}

        function mostrarFeedback(sucesso) {
            const modal = document.getElementById('modalFeedback');
            const icon = document.getElementById('feedbackIcon');
            const title = document.getElementById('feedbackTitle');
            const msg = document.getElementById('feedbackMsg');

            if(sucesso) {
                icon.innerHTML = '🎉';
                title.innerText = 'Recebido!';
                msg.innerText = 'Sua inscrição foi enviada com sucesso. Em breve nossa equipe entrará em contato para confirmar sua integração!';
            } else {
                icon.innerHTML = '❌';
                title.innerText = 'Ops!';
                msg.innerText = 'Ocorreu um erro ao enviar. Por favor, tente novamente ou fale com um líder.';
            }
            modal.style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('modalFeedback').style.display = 'none';
            document.querySelector('form').reset();
        }
    </script>
</body>
</html>
